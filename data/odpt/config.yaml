output: generated/hiding-zone-presets.json
cacheDir: cache
notice: NOTICE.md
presets:
    - id: tokyo-metro
      label: Tokyo Metro
      operator: TokyoMetro
      defaultColor: "#009BBF"
      url: "https://api.odpt.org/api/v4/files/TokyoMetro/data/TokyoMetro-Train-GTFS.zip?acl:consumerKey=${ODPT_KEY}"
      requiresKey: true
    - id: toei-subway
      label: Toei Subway
      operator: Toei
      defaultColor: "#6CBB5A"
      url: "https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip"
      requiresKey: false
