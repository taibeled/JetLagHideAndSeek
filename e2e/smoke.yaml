appId: com.raycatdev.hideandseek.v2
---
- launchApp:
      clearState: true
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 15000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- assertVisible:
      id: "main-settings-row"
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- swipe:
      start: "2%,75%"
      end: "80%,75%"
      duration: 500
- extendedWaitUntil:
      visible: "Game Setup"
      timeout: 10000
- assertVisible:
      id: "main-settings-row"
