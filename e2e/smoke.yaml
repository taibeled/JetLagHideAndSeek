appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          platform: iOS
      commands:
          - extendedWaitUntil:
                visible: "Continue"
                timeout: 15000
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 120000
- runFlow:
      when:
          visible: "Open bottom sheet"
      commands:
          - tapOn: "Open bottom sheet"
- extendedWaitUntil:
      visible: "Game Setup"
      timeout: 10000
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- swipe:
      start: "2%,75%"
      end: "80%,75%"
      duration: 500
- extendedWaitUntil:
      visible: "Game Setup"
      timeout: 10000
- assertVisible:
      id: "main-settings-row"
