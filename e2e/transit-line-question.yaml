appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      notVisible: "Continue"
      timeout: 60000
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- tapOn:
      point: "50%,45%"
- tapOn:
      point: "50%,32%"
- tapOn:
      point: "50%,60%"
- tapOn:
      point: "91%,48%"
- tapOn:
      point: "91%,48%"
- tapOn:
      point: "50%,78%"
- tapOn:
      point: "50%,55%"
- tapOn:
      point: "50%,55%"
- tapOn:
      point: "50%,55%"
- takeScreenshot: e2e/artifacts/transit-line-question/transit-line-hit-map
