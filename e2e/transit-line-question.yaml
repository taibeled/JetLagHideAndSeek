appId: com.raycatdev.hideandseek.v2
---
- clearState
- runFlow: e2e/bootstrap.yaml
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- runFlow: e2e/dismiss-continue.yaml
- assertVisible: "Tokyo 23 Wards"
- tapOn: "Settings"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Open Hiding Zones settings"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Tokyo Metro, Add"
- waitForAnimationToEnd:
      timeout: 1000
- assertVisible: ".*1 preset selected.*"
- stopApp
- runFlow: e2e/reconnect.yaml
- assertVisible: "Tokyo 23 Wards"
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- runFlow: e2e/dismiss-continue.yaml
- assertVisible: "Tokyo 23 Wards"
- tapOn: "Questions"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add question"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Open matching questions"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add transit line question"
- waitForAnimationToEnd:
      timeout: 1000
- assertVisible: ".*Transit line question detail.*"
- assertVisible: ".*Transit line answer section.*"
- assertVisible: ".*Set transit line pin to my location.*"
- assertVisible: ".*Hit answer.*"
- tapOn:
      point: "50%,84%"
- waitForAnimationToEnd:
      timeout: 1000
- assertVisible: "Tokyo 23 Wards"
- takeScreenshot: e2e/artifacts/transit-line-question/transit-line-hit-map
