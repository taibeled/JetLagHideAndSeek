appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          platform: iOS
      commands:
          - extendedWaitUntil:
                visible: "Continue"
                timeout: 10000
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 120000
- runFlow:
      when:
          visible: "Open bottom sheet"
      commands:
          - tapOn: "Open bottom sheet"
- extendedWaitUntil:
      visible: "Game Setup"
      timeout: 10000
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- tapOn:
      id: "settings-hiding-zone-row"
- extendedWaitUntil:
      visible: "Hiding Zones"
      timeout: 10000
- tapOn:
      id: "hiding-zone-preset-tokyo-metro"
- tapOn: "Back"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- tapOn: "Back"
- extendedWaitUntil:
      visible: "Game Setup"
      timeout: 10000
- tapOn:
      id: "main-questions-row"
- extendedWaitUntil:
      visible: "Question List"
      timeout: 10000
- tapOn:
      id: "questions-add-question-row"
- extendedWaitUntil:
      visible: "Choose a question"
      timeout: 10000
- tapOn:
      id: "add-matching-question-row"
- extendedWaitUntil:
      visible: "Transit · Transit Line"
      timeout: 10000
- assertVisible:
      id: "matching-answer-option-unanswered"
- assertVisible:
      id: "matching-answer-option-positive"
- assertVisible:
      id: "matching-answer-option-negative"
- assertVisible:
      id: "transit-line-option-2"
- tapOn:
      id: "transit-line-option-2"
- tapOn:
      id: "matching-answer-option-positive"
- takeScreenshot: e2e/artifacts/transit-line-question/transit-line-hit-map
- tapOn: "Back"
- extendedWaitUntil:
      visible: "Question List"
      timeout: 10000
- assertVisible: "Open matching question 1"
