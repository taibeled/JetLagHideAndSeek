appId: com.hinoka.hideandseek.v2
---
- launchApp:
      clearState: true
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- tapOn:
      id: "settings-hiding-zone-row"
- extendedWaitUntil:
      visible: "Eligible Transit Stations"
      timeout: 10000
- assertVisible: "Hiding zone settings; radius 600 m; stored as 600 m; 0 presets selected; 0 stations"
- tapOn:
      point: "50%,69%"
- assertVisible: "Hiding zone settings; radius 600 m; stored as 600 m; 1 preset selected; 185 stations"
- tapOn:
      point: "74%,40%"
- assertVisible: "Hiding zone settings; radius 0.60 km; stored as 600 m; 1 preset selected; 185 stations"
- tapOn:
      point: "31%,40%"
- eraseText
- inputText: "1"
- assertVisible: "Hiding zone settings; radius 1 km; stored as 1000 m; 1 preset selected; 185 stations"
- tapOn:
      point: "50%,24%"
- swipe:
      start: "50%,15%"
      end: "50%,85%"
      duration: 500
- takeScreenshot: e2e/artifacts/hiding-zone/hiding-zone-map
