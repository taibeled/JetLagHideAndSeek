appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-questions-row"
- extendedWaitUntil:
      visible: "Question List"
      timeout: 10000
- tapOn:
      id: "questions-add-question-row"
- extendedWaitUntil:
      visible: "Choose a question"
      timeout: 10000
- tapOn:
      id: "add-radar-question-row"
- extendedWaitUntil:
      visible: "Radar Question"
      timeout: 10000
- assertVisible:
      id: "radar-distance-option-500m"
- assertVisible:
      id: "radar-distance-option-1km"
- assertVisible:
      id: "radar-distance-option-2km"
- assertVisible:
      id: "radar-distance-option-5km"
- assertVisible:
      id: "radar-answer-option-unanswered"
- assertVisible:
      id: "radar-answer-option-positive"
- assertVisible:
      id: "radar-answer-option-negative"
- assertVisible:
      id: "radar-pin-lock-button"
- tapOn:
      id: "radar-answer-option-negative"
- tapOn:
      point: "48%,31%"
- tapOn:
      id: "radar-distance-option-1km"
- assertVisible: "Current distance 1000 m"
- takeScreenshot: e2e/artifacts/radar-question/radar-question-miss-map
- tapOn: "Back"
- extendedWaitUntil:
      visible: "Question List"
      timeout: 10000
- assertVisible: "Open radar question 1"
