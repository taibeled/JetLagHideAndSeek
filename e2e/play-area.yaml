appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- tapOn:
      id: "settings-play-area-row"
- extendedWaitUntil:
      visible: "Map Boundary"
      timeout: 10000
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- tapOn:
      point: "38%,39%"
- inputText: "358674"
- tapOn:
      point: "80%,39%"
- extendedWaitUntil:
      visible: "Osaka"
      timeout: 90000
