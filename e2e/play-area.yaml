appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          platform: iOS
      commands:
          - extendedWaitUntil:
                visible: "Continue"
                timeout: 10000
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 120000
- runFlow:
      when:
          visible: "Open bottom sheet"
      commands:
          - tapOn: "Open bottom sheet"
- extendedWaitUntil:
      id: "main-settings-row"
      timeout: 10000
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      visible: "Game Settings"
      timeout: 10000
- tapOn:
      id: "settings-play-area-row"
- extendedWaitUntil:
      visible: "Map Boundary"
      timeout: 10000
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- tapOn:
      point: "38%,39%"
- inputText: "358674"
- tapOn:
      point: "80%,39%"
- extendedWaitUntil:
      visible: "Osaka"
      timeout: 90000
