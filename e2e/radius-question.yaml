appId: com.hinoka.hideandseek.v2
---
- launchApp:
      clearState: true
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-add-question-row"
- extendedWaitUntil:
      visible: "Choose a question"
      timeout: 10000
- tapOn:
      id: "add-radius-question-row"
- extendedWaitUntil:
      visible: "Preview Radius"
      timeout: 10000
- assertVisible: "500m"
- assertVisible: "1km"
- assertVisible: "2km"
- assertVisible: "5km"
- assertVisible: "10km"
- assertVisible: "Other"
- assertVisible: "Unlocked"
- assertVisible: "Select hiding-zone presets to compare against nearby stations."
- tapOn:
      point: "48%,31%"
- tapOn:
      id: "radius-option-1km"
- assertVisible: "Current radius 1000 m"
- takeScreenshot: e2e/artifacts/radius-question/radius-question-map
