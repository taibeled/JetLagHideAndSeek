appId: com.hinoka.hideandseek.v2
---
- launchApp:
      clearState: true
- openLink: "jetlag-hide-seek-v2://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081&disableOnboarding=1"
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- extendedWaitUntil:
      visible: "Continue"
      timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
      visible: "Connected to:"
      timeout: 10000
- tapOn:
      point: "91%,48%"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-questions-row"
- extendedWaitUntil:
      visible: "Question List"
      timeout: 10000
- tapOn:
      id: "questions-add-question-row"
- extendedWaitUntil:
      visible: "Choose a question"
      timeout: 10000
- tapOn:
      id: "add-radius-question-row"
- extendedWaitUntil:
      visible: "Preview Radius"
      timeout: 10000
- assertVisible:
      id: "radius-option-500m"
- assertVisible:
      id: "radius-option-1km"
- assertVisible:
      id: "radius-option-2km"
- assertVisible:
      id: "radius-option-5km"
- assertVisible:
      id: "radius-option-10km"
- assertVisible:
      id: "radius-option-other"
- assertVisible:
      id: "radius-pin-lock-button"
- assertVisible:
      id: "radius-pin-help"
- tapOn:
      point: "48%,31%"
- tapOn:
      id: "radius-option-1km"
- assertVisible: "Current radius 1000 m"
- takeScreenshot: e2e/artifacts/radius-question/radius-question-map
